version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '5005:5005'
    environment:
      - PORT=5005
      - NODE_ENV=production
      # Pass API keys from host environment
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:5005
    depends_on:
      - backend
    restart: always
